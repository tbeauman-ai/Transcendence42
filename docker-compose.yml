services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - nodejs
    networks:
      - tcg
    restart: unless-stopped

  nodejs:
    build: ./nodejs
    container_name: nodejs
    env_file:
      - ./.env
    depends_on:
      - mysql
    networks:
      - tcg
    restart: unless-stopped

  mysql:
    image: mysql:latest
    container_name: mysql
    volumes:
      - db_data:/var/lib/mysql
    env_file:
      - ./.env
    networks:
      - tcg
    restart: unless-stopped

volumes:
  db_data:
    name: db_data

networks:
  tcg:
    driver: bridge
