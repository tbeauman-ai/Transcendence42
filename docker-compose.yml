services:
  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  logstash:
    image: logstash:8.11.0
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch

  kibana:
    image: kibana:8.11.0
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - nodejs
    networks:
      - otta
    restart: unless-stopped

  nodejs:
    build: ./nodejs
    container_name: nodejs
    env_file:
      - ./.env
    depends_on:
        mysql:
            condition: service_healthy
    networks:
      - otta
    restart: unless-stopped

  mysql:
    build: ./mysql
    container_name: mysql
    volumes:
      - db_data:/var/lib/mysql
    env_file:
      - ./.env
    networks:
      - otta
    restart: unless-stopped
    healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 5s
        timeout: 5s
        retries: 10

volumes:
  db_data:
    name: db_data

networks:
  otta:
    driver: bridge
